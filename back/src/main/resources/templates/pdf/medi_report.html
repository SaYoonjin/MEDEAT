<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
<meta charset="UTF-8" />
<title>MEDI_EAT Medical Report</title>
<link
	href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&amp;display=swap"
	rel="stylesheet" />

<style>
/*<![CDATA[*/
@page {
	size: A4;
	margin: 15mm 15mm 20mm 15mm;
}

body {
	font-family: 'Noto Sans KR', sans-serif;
	font-size: 11px;
	color: #334155;
	line-height: 1.4;
	margin: 0;
	padding: 0;
	background-color: #ffffff;
}

table {
	width: 100%;
	border-collapse: collapse;
	table-layout: fixed;
}

.bold {
	font-weight: 700;
}

.muted {
	color: #94a3b8;
}

.section {
	margin-bottom: 25px;
	page-break-inside: avoid;
}

/* Header */
.header-area {
	border-bottom: 3px solid #0f172a;
	padding-bottom: 15px;
	margin-bottom: 25px;
}

.title-tag {
	background: #2563eb;
	color: #ffffff;
	padding: 2px 8px;
	border-radius: 4px;
	font-size: 9px;
	font-weight: 700;
	display: inline-block;
}

.title-main {
	font-size: 22px;
	font-weight: 900;
	color: #0f172a;
	margin-top: 5px;
}

.section-header {
	font-size: 14px;
	font-weight: 800;
	color: #1e293b;
	margin-bottom: 12px;
	border-left: 4px solid #2563eb;
	padding-left: 10px;
}

.summary-card {
	background: #f8fafc;
	border: 1px solid #e2e8f0;
	border-radius: 8px;
	padding: 12px;
}

.label {
	font-size: 10px;
	color: #64748b;
}

.value {
	font-size: 13px;
	font-weight: 700;
}

.comment-box {
	background: #eff6ff;
	border-left: 4px solid #3b82f6;
	padding: 12px 15px;
	margin-top: 10px;
	border-radius: 0 8px 8px 0;
}

.content-wrapper {
	border: 1px solid #e2e8f0;
	border-radius: 8px;
	overflow: hidden;
}

.content-table th {
	background: #f1f5f9;
	color: #475569;
	padding: 10px 5px;
	font-weight: 700;
	border-bottom: 1px solid #e2e8f0;
}

.content-table td {
	padding: 10px 5px;
	border-bottom: 1px solid #f1f5f9;
	text-align: center;
	vertical-align: middle;
}

.rate-badge {
	display: inline-block;
	background: #e0f2fe;
	color: #0369a1;
	padding: 3px 10px;
	border-radius: 12px;
	font-weight: 700;
}

.drug-name {
	color: #2563eb;
	font-weight: 700;
}

.atpn-warn {
	color: #dc2626;
	font-size: 10px;
}

.page-break {
	page-break-before: always;
}

.expected-daily {
  font-weight: 600;
  color: #2563eb;
}
.expected-total {
  color: #6b7280;
  font-size: 10px;
}

/*]]>*/
</style>
</head>

<body>

	<!-- ================= HEADER ================= -->
	<div class="header-area">
		<table>
			<tr>
				<td>
					<div class="title-tag">PATIENT REPORT</div>
					<div class="title-main">MEDI_EAT 복약 리포트</div>
					<div class="muted" style="margin-top: 5px;">
						분석 기간: <span
							th:text="${#temporals.format(startDate,'yyyy.MM.dd')}"></span> ~
						<span th:text="${#temporals.format(endDate,'yyyy.MM.dd')}"></span>
					</div>
				</td>
				<td style="text-align: right; vertical-align: bottom;">
					<div style="font-size: 14px;">
						<span class="bold" th:text="${patientSummary.name}">사용자</span> 님
					</div>
					<div class="muted" style="font-size: 10px;">
						생성일: <span
							th:text="${#temporals.format(generatedAt,'yyyy.MM.dd')}"></span>
					</div>
				</td>
			</tr>
		</table>
	</div>

	<!-- ================= PATIENT SUMMARY ================= -->
	<div class="section">
		<div class="section-header">환자 요약</div>
		<table>
			<tr>
				<td><div class="summary-card">
						<div class="label">환자 ID</div>
						<div class="value" th:text="${patientSummary.patientId}"></div>
					</div></td>
				<td><div class="summary-card">
						<div class="label">나이</div>
						<div class="value">
							<span th:text="${patientSummary.age}"></span>세
						</div>
					</div></td>
				<td><div class="summary-card">
						<div class="label">종합 등급</div>
						<div class="value" th:text="${patientSummary.overallGrade}"></div>
					</div></td>
			</tr>
		</table>

		<div class="comment-box">
			<span class="bold">[종합 의견]</span> <span
				th:text="${patientSummary.summaryComment}"></span>
		</div>
	</div>

	<!-- ================= ADHERENCE ================= -->
	<div class="section">
		<div class="section-header">약물별 복약 이행률</div>

		<div class="content-wrapper">
			<table class="content-table">
				<thead>
					<tr>
						<th>약물명</th>
						<th>기대 복용 횟수</th>
						<th>실제 복용 횟수</th>
						<th>이행률</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="m : ${adherenceStats.medicationRates}">
					  <td class="drug-name" th:text="${m.drugName}"></td>
					
					  <!-- ✅ 기대 복용 횟수 (사람 친화적 표시) -->
					  <td>
					    <span th:text="'1일 ' + ${m.dailyCount} + '회'"></span>
					    <span class="muted"
					          th:text="' · 총 ' + ${m.expectedCount} + '회'"></span>
					  </td>
					
					  <td th:text="${m.takenCount}"></td>
					
					  <td>
					    <span class="rate-badge"
					          th:text="${m.adherenceRate + '%'}"></span>
					  </td>
					</tr>


					<tr
						th:if="${adherenceStats.medicationRates == null or #lists.isEmpty(adherenceStats.medicationRates)}">
						<td colspan="4" class="muted" style="padding: 20px;">복약 데이터가
							없습니다.</td>
					</tr>
				</tbody>
			</table>
		</div>

		<div class="muted" style="margin-top: 8px;"
			th:text="${adherenceStats.analysisText}"></div>
	</div>

	<!-- ================= DAILY LOG ================= -->
	<div class="section">
		<div class="section-header">일자별 복약 기록</div>

		<div class="content-wrapper">
			<table class="content-table">
				<thead>
					<tr>
						<th>일시</th>
						<th>약물명</th>
						<th>복용 시간대</th>
						<th>복용 여부</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="log : ${medicationDailyLogs}">
						<td th:text="${log.date}"></td>
						<td th:text="${log.drugName}"></td>
						<td th:text="${log.intakeTime}"></td>
						<td th:text="${log.status}"
							th:style="${log.status == '복용' ? 'color:#16a34a;font-weight:700' : 'color:#dc2626;font-weight:700'}">
						</td>
					</tr>

					<tr
						th:if="${medicationDailyLogs == null or #lists.isEmpty(medicationDailyLogs)}">
						<td colspan="4" class="muted" style="padding: 20px;">복약 기록이
							없습니다.</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>

	<div class="page-break"></div>

	<!-- ================= MEDICATION LIST ================= -->
	<div class="section">
		<div class="section-header">현재 복용 중인 약물</div>

		<div class="content-wrapper">
			<table class="content-table">
				<thead>
					<tr>
						<th>약물명</th>
						<th>성분</th>
						<th>용량</th>
						<th>1일 횟수</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="m : ${medicationList}">
						<td class="drug-name" th:text="${m.drugName}"></td>
						<td th:text="${m.ingredient}"></td>
						<td th:text="${m.dose}"></td>
						<td th:text="${m.dailyCount}"></td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>

	<!-- ================= DRUG INFO ================= -->
	<div class="section">
		<div class="section-header">약물 효능 및 주의사항</div>

		<div class="content-wrapper">
			<table class="content-table">
				<thead>
					<tr>
						<th>약물명</th>
						<th>효능</th>
						<th>복용 방법</th>
						<th>주의사항</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="d : ${drugInfoList}">
						<td class="bold" th:text="${d.itemName}"></td>
						<td style="font-size: 10px;" th:text="${d.efcyQesitm}"></td>
						<td style="font-size: 10px;" th:text="${d.useMethodQesitm}"></td>
						<td class="atpn-warn" th:text="${d.atpnWarnQesitm}"></td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>

	<!-- ================= FOOTER ================= -->
	<div
		style="margin-top: 30px; border-top: 1px solid #e2e8f0; padding-top: 10px;">
		<div class="muted" style="font-size: 9px;">본 리포트는 참고용이며, 정확한 진단
			및 처방은 반드시 전문의와 상담하시기 바랍니다.</div>
	</div>

</body>
</html>
