<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDEAT - Welcome</title>

    <!-- 기본 스타일 -->
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Noto Sans KR", sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 2.3rem;
            color: #2b2b2b;
            margin-bottom: 40px;
            font-weight: 700;
        }

        .btn {
            display: block;
            width: 240px;
            padding: 16px 0;
            margin: 12px auto;
            font-size: 1.1rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            color: white;
            transition: 0.2s ease;
            text-decoration: none;
        }

        .btn.signup {
            background-color: #3c7dff;
        }
        .btn.signup:hover {
            background-color: #2e64d6;
        }

        .btn.login {
            background-color: #4CAF50;
        }
        .btn.login:hover {
            background-color: #3d8a40;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #555;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>MEDEAT에 오신 것을 환영합니다 👋</h1>

    <a href="/auth/signup" class="btn signup">회원가입 하기</a>
    <a href="/auth/login" class="btn login">로그인 하기</a>

    <div class="footer">© 2025 MEDEAT</div>
</div>

</body>
</html>
