spring.application.name=Medeat

mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.medeat
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl

spring.datasource.url=${MEDEAT_DB_URL:jdbc:mysql://localhost:3306/medeat?serverTimezone=UTC&characterEncoding=UTF-8}
spring.datasource.username=${MEDEAT_DB_USERNAME:ssafy}
spring.datasource.password=${MEDEAT_DB_PASSWORD:ssafy}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

server.servlet.session.timeout=120m
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false

springdoc.api-docs.enabled=true

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
spring.jackson.serialization.fail-on-empty-beans=false

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

medeat.storage.upload-dir=${MEDEAT_UPLOAD_DIR:C:/medeat/upload}

mfds.drug.base-url=${MFDS_DRUG_BASE_URL:https://apis.data.go.kr/1471000/DrugPrdtPrmsnInfoService07}
mfds.drug.service-key=${MFDS_DRUG_SERVICE_KEY:}

pill.embed.python-path=${PILL_EMBED_PYTHON_PATH:C:/pill_embed_project/venv/Scripts/python.exe}
pill.embed.script-path=${PILL_EMBED_SCRIPT_PATH:C:/pill_embed_project/single_embed.py}
pill.embed.workdir=${PILL_EMBED_WORKDIR:C:/pill_embed_project}
pill.embed.encoding=${PILL_EMBED_ENCODING:utf-8}

spring.mail.host=${SPRING_MAIL_HOST:smtp.naver.com}
spring.mail.port=${SPRING_MAIL_PORT:465}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_SSL_TRUST:smtp.naver.com}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

project.mail.sender-name=${PROJECT_MAIL_SENDER_NAME:MEDEAT}

java.net.preferIPv4Stack=true

gms.base-url=${GMS_BASE_URL:https://gms.ssafy.io/gmsapi}
gms.api-key=${GMS_API_KEY:}
gms.timeout-ms=${GMS_TIMEOUT_MS:15000}
